name: Astronomer CI - Deploy dbt core

on:
    push:
        branches:
            - main

env: 
    ## Sets Deployment API credentails as envioronment variables
    ASTRO_API_TOKEN: ${{ secrets.ASTRO_API_TOKEN }}

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Deploy to Astro
              uses: astronomer/deploy-action@v0.10.1
              with:
                    deployment-id: ${{ secrets.ASTRO_DEPLOYMENT_ID }}
                    deploy-type: dbt
                    root-folder: jornada-dw
